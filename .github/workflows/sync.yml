name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "cutestar.panda@gmail.com"
          git config --global user.name "CuteNiru"
          # This command forces a clean push of only current files
          git push --force https://CuteNiru:$HF_TOKEN@huggingface.co/spaces/CuteStarOC01/openclaw-delta-ai main
